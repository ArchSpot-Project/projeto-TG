<app-page-layout [title]="projectName +' - Álbuns de Fotos'" [showSidebar]="false" [showBackButton]="true">
  <div class="container">
    <div class="row mt-3 mb-4 align-items-center">
      <div class="col">
        <h2 class="fw-light">Álbum: {{albumName}}</h2>
      </div>
      <div class="col-auto">
        <button class="btn btn-outline-success btn-sm p-2">
          + Adicionar foto
        </button>
      </div>
    </div>

    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-success"></div>
    </div>

    <div *ngIf="!loading && photos.length === 0" class="text-center text-muted py-5 fs-5">
      Album vazio.
    </div>

    <div class="row g-3 row-cols-2 row-cols-md-3 row-cols-lg-4">
      <div class="col" *ngFor="let photo of photos">
        <div class="card border-0 shadow-sm">
          <img [src]="photo.fileUrl" class="card-img-top rounded-2" alt="{{ photo.name }}">
        </div>
      </div>
    </div>
  </div>
</app-page-layout>
