<div class="row" *ngIf="!isGenerated; else relatorioGerado">
  <div class="col fs-5 fw-medium">Gerar relatório - Pagamentos por Projeto</div>
  <hr class="mt-0">
</div>

<div *ngIf="!isGenerated" class="row">
  <form class="col">
    <div class="mb-0">
      <label class="form-label">Projeto:</label>
      <select class="form-select shadow-sm" [(ngModel)]="formData.projeto" name="projeto">
        <option value="">Selecione</option>
        <option *ngFor="let p of projetos" [value]="p.projectId">{{ p.projectName }}</option>
      </select>
    </div>
  </form>

  <div class="col text-end align-self-end">
    <button type="button" class="btn btn-success" (click)="gerarRelatorio()">Gerar Relatório</button>
  </div>
</div>

<!-- relatório gerado -->
<ng-template #relatorioGerado>
  <app-reports-table [titulo]="'Pagamentos por Projeto - ' + projetoSelecionado.projectName" 
  [pdfNomeArquivo]="'relatorio_pagamentos_projeto.pdf'"
  [colunas]="[
  { campo: 'projeto', label: 'Projeto' },
  { campo: 'name', label: 'Parcela' },
  { campo: 'description', label: 'Descrição' },
  { campo: 'status', label: 'Status', pipe: 'statusTranslate' },
  { campo: 'amount', label: 'Valor', pipe: 'currency' },
  { campo: 'paymentMethod', label: 'Método de Pagamento', pipe: 'paymentMethod' },
  { campo: 'estimatedPaymentDate', label: 'Previsão Pgto', pipe: 'date' },
  { campo: 'realPaymentDate', label: 'Data Pgto', pipe: 'date' }
]" [registros]="parcelas" [loading]="loading" [error]="error" (voltar)="voltarEdicao()">
  </app-reports-table>
</ng-template>
