<!-- FORM -->
<div *ngIf="!isGenerated; else relatorioGerado">
  <div class="row">
    <div class="col fs-5 fw-medium">Gerar relatório - Cronograma Geral</div>
    <hr class="mt-0">
  </div>

  <form [formGroup]="form" class="p-3">
    <div class="row g-3">
      <div class="col">
        <label class="form-label">De:</label>
        <input type="date" formControlName="startDate" class="form-control shadow-sm">
      </div>
      
      <div class="col">
        <label class="form-label">Até:</label>
        <input type="date" formControlName="endDate" class="form-control shadow-sm">
      </div>
      
      <div class="col">  
        <label class="form-label">Status do Projeto</label>
        <select class="form-select" formControlName="projectStatus">
          <option [ngValue]="null">Todos</option>
          <option value="PLANNED">Não iniciado</option>
          <option value="IN_PROGRESS">Em andamento</option>
          <option value="COMPLETED">Concluído</option>
          <option value="CANCELLED">Cancelado</option>
        </select>
      </div>
    </div>
    

    <div class="col-12 text-end mt-3">
      <button type="button" class="btn btn-success me-2" (click)="gerarRelatorio()">Gerar Relatório</button>
      <button type="button" class="btn btn-outline-secondary" (click)="limparFiltros()">Limpar</button>
    </div>
  </form>
</div>

<!-- REPORT -->
<ng-template #relatorioGerado>
  <app-reports-table
    [titulo]="'Cronograma Geral'"
    [pdfNomeArquivo]="'relatorio_cronograma_geral.pdf'"
    [colunas]="colunas"
    [registros]="rows"
    [loading]="loading"
    [error]="error"
    (voltar)="voltarEdicao()">
  </app-reports-table>
</ng-template>
