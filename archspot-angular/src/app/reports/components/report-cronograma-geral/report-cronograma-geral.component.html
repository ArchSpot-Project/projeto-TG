<div class="row" *ngIf="!isGenerated; else relatorioGerado">
  <div class="col fs-5 fw-medium">Gerar relatório - Cronograma Geral</div>
  <hr class="mt-0">
</div>

<!-- formulário de filtros -->
<div *ngIf="!isGenerated">
  <form [formGroup]="form" class="row">
    <div class="col mb-3">
      <label class="form-label">De:</label>
      <input type="date" class="form-control shadow-sm" formControlName="startDate">
    </div>

    <div class="col mb-3">
      <label class="form-label">Até:</label>
      <input type="date" class="form-control shadow-sm" formControlName="endDate">
    </div>

    <div class="col mb-3">
      <label class="form-label">Status:</label>
      <select class="form-select shadow-sm" formControlName="projectStatus">
        <option value="">Todos</option>
        <option value="IN_PROGRESS">Em andamento</option>
        <option value="COMPLETED">Concluído</option>
        <option value="OVERDUE">Atrasado</option>
      </select>
    </div>

    <div class="col-12 text-end mt-3">
      <button type="button" class="btn btn-success me-2" (click)="gerarRelatorio()">Gerar Relatório</button>
      <button type="button" class="btn btn-outline-secondary" (click)="limparFiltros()">Limpar</button>
    </div>
  </form>
</div>

<!-- relatório gerado -->
<ng-template #relatorioGerado>
  <app-reports-table [titulo]="'Cronograma Geral'" [pdfNomeArquivo]="'relatorio_cronograma_geral.pdf'" [colunas]="[
      { campo: 'projectName', label: 'Projeto' },
      { campo: 'name', label: 'Etapa' },
      { campo: 'status', label: 'Status', pipe:'phaseStatus' },
      { campo: 'estimatedStartDate', label: 'Previsão Início', pipe:'date' },
      { campo: 'estimatedEndDate', label: 'Previsão Término', pipe:'date' },
      { campo: 'realStartDate', label: 'Data Real Início', pipe:'date' },
      { campo: 'realEndDate', label: 'Data Real Término', pipe:'date' }
    ]" [registros]="rows" [loading]="loading" [error]="error" (voltar)="voltarEdicao()">
  </app-reports-table>
</ng-template>
