<div class="row" *ngIf="!isGenerated; else relatorioGerado">
  <div class="col fs-5 fw-medium">Gerar relatório - Cronograma por Projeto</div>
  <hr class="mt-0">
</div>

<div *ngIf="!isGenerated" class="row">
  <form class="col">
    <div class="mb-0">
      <label class="form-label">Projeto:</label>
      <select class="form-select shadow-sm" [(ngModel)]="formData.projeto" name="projeto">
        <option value="">Selecione</option>
        <option *ngFor="let p of projetos" [value]="p.projectId">{{ p.projectName }}</option>
      </select>
    </div>
  </form>

  <div class="col text-end align-self-end">
    <button type="button" class="btn btn-success" (click)="gerarRelatorio()">Gerar Relatório</button>
  </div>
</div>

<!-- relatório gerado -->
<ng-template #relatorioGerado>
  <app-reports-table
    [titulo]="'Cronograma Por Projeto'"
    [pdfNomeArquivo]="'relatorio_cronograma_projeto.pdf'"
    [colunas]="[
      { campo: 'projectName', label: 'Projeto' },
      { campo: 'name', label: 'Etapa' },
      { campo: 'status', label: 'Status' },
      { campo: 'estimatedStartDate', label: 'Previsão Início', pipe:'date' },
      { campo: 'estimatedEndDate', label: 'Previsão Término', pipe:'date' },
      { campo: 'realStartDate', label: 'Data Real Início', pipe:'date' },
      { campo: 'realEndDate', label: 'Data Real Término', pipe:'date' }
    ]"
    [registros]="phases"
    [loading]="loading"
    [error]="error"
    (voltar)="voltarEdicao()">
  </app-reports-table>
</ng-template>
