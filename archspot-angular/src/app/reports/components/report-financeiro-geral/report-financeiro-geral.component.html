<div *ngIf="!isGenerated; else relatorioGerado">
    <div class="row">
        <div class="col fs-5 fw-medium">Gerar relatório - Pagamentos Gerais</div>
        <hr class="mt-0">
    </div>

    <form [formGroup]="form" (ngSubmit)="gerarRelatorio()" class="p-3">

        <div class="row g-3">

            <div class="col-md-3">
                <label class="form-label">Data inicial</label>
                <input type="date" class="form-control" formControlName="startDate">
            </div>

            <div class="col-md-3">
                <label class="form-label">Data final</label>
                <input type="date" class="form-control" formControlName="endDate">
            </div>

            <div class="col-md-3">
                <label class="form-label">Método de pagamento</label>
                <select class="form-select" formControlName="paymentMethod">
                    <option [ngValue]="null">Todos</option>
                    <option value="PIX">PIX</option>
                    <option value="BOLETO">Boleto</option>
                    <option value="CREDIT_CARD">Cartão de Crédito</option>
                    <option value="DEBIT_CARD">Cartão de Débito</option>
                    <option value="TRANSFER">Transferência</option>
                    <option value="CASH">Dinheiro</option>
                    <option value="CHECK">Cheque</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Status do Projeto</label>
                <select class="form-select" formControlName="projectStatus">
                    <option [ngValue]="null">Todos</option>
                    <option value="PLANNED">Não iniciado</option>
                    <option value="IN_PROGRESS">Em andamento</option>
                    <option value="COMPLETED">Concluído</option>
                    <option value="CANCELLED">Cancelado</option>
                </select>
            </div>
        </div>

        <button class="btn btn-primary mt-3" type="submit" [disabled]="loading">
            {{ loading ? "Gerando..." : "Gerar relatório" }}
        </button>

        <div *ngIf="error" class="text-danger mt-2">{{ error }}</div>
    </form>
</div>

<!-- relatório -->
<ng-template #relatorioGerado>
    <app-reports-table
        [titulo]="'ArchSpot - Relatório de Pagamentos Gerais'"
        [pdfNomeArquivo]="'relatorio_pagamentos_gerais.pdf'"
        [colunas]="colunas"
        [registros]="rows"
        [loading]="loading"
        [error]="error"
        (voltar)="voltarEdicao()">
    </app-reports-table>
</ng-template>
