<div class="row" *ngIf="!isGenerated; else relatorioGerado">
  <div class="col fs-5 fw-medium">Gerar relatório - Pagamentos Gerais</div>
  <hr class="mt-0">
</div>

<div *ngIf="!isGenerated">

  <!-- datas -->
  <div class="row mb-3">
    <div class="col-md-6">
      <label class="form-label">De:</label>
      <input type="date" class="form-control shadow-sm" [(ngModel)]="formData.periodoInicio" name="inicio">
    </div>

    <div class="col-md-6">
      <label class="form-label">Até:</label>
      <input type="date" class="form-control shadow-sm" [(ngModel)]="formData.periodoFim" name="fim">
    </div>
  </div>

  <!-- filtros -->
  <div class="row mb-3">
    <div class="col-md-6">
      <label class="form-label">Status da parcela:</label>
      <select class="form-select shadow-sm" [(ngModel)]="formData.status" name="status">
        <option value="todos" selected>Todos</option>
        <option value="pendente">Pendente</option>
        <option value="paga">Paga</option>
        <option value="em_atraso">Em atraso</option>
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">Método de pagamento:</label>
      <select class="form-select shadow-sm" [(ngModel)]="formData.metodoPagamento" name="metodo">
        <option value="todos" selected>Todos</option>
        <option value="boleto">Boleto</option>
        <option value="pix">PIX</option>
        <option value="cartao_credito">Cartão de Crédito</option>
        <option value="cartao_debito">Cartão de Débito</option>
        <option value="transferencia">Transferência</option>
        <option value="cheque">Cheque</option>
        <option value="dinheiro">Dinheiro em espécie</option>
      </select>
    </div>
  </div>

  <!-- Botões -->
  <div class="row">
    <div class="col-12 text-end">
      <button type="button" class="btn btn-success me-2" (click)="gerarRelatorio()">Gerar Relatório</button>
      <button type="button" class="btn btn-outline-secondary" (click)="limparFiltros()">Limpar</button>
    </div>
  </div>
</div>

<!-- relatório gerado -->
<ng-template #relatorioGerado>
  <app-reports-table [titulo]="'ArchSpot - Relatório de Pagamentos Gerais'" [pdfNomeArquivo]="'relatorio_pagamentos_gerais.pdf'" [colunas]="[
  { campo: 'projectName', label: 'Projeto' },
  { campo: 'projectStatus', label: 'Status do Projeto', pipe:'statusTranslate' },
  { campo: 'name', label: 'Nome da Parcela' },
  { campo: 'amount', label: 'Valor da Parcela' },
  { campo: 'status', label: 'Status da Parcela', pipe:'paymentStatus' },
  { campo: 'paymentMethod', label: 'Método de Pagamento', pipe:'paymentMethod' },
  { campo: 'estimatedPaymentDate', label: 'Data Prevista', pipe:'date' },
  { campo: 'realPaymentDate', label: 'Data de Pagamento', pipe:'date' }
]" [registros]="parcelas" [loading]="loading" [error]="error" (voltar)="voltarEdicao()">
  </app-reports-table>
</ng-template>
