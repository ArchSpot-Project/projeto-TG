<form [formGroup]="form" (ngSubmit)="gerarRelatorio()" class="p-3">
  <div class="row g-3">
    <div class="col-md-3"><input type="date" class="form-control" formControlName="startDate"
        placeholder="Data inicial"></div>
    <div class="col-md-3"><input type="date" class="form-control" formControlName="endDate" placeholder="Data final">
    </div>
    <div class="col-md-3"><input type="text" class="form-control" formControlName="paymentMethod"
        placeholder="Método de pagamento"></div>
    <div class="col-md-3"><input type="text" class="form-control" formControlName="projectStatus"
        placeholder="Status do projeto"></div>
  </div>
  <button class="btn btn-primary mt-3" type="submit">Gerar relatório</button>
</form>

<div *ngIf="isGenerated">
  <table class="table mt-4 table-bordered table-striped">
    <thead>
      <tr>
        <th>Projeto</th>
        <th>Status</th>
        <th>Total</th>
        <th>Pago</th>
        <th>Restante</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of rows">
        <td>{{ r.projectName }}</td>
        <td>{{ r.status }}</td>
        <td>{{ r.totalValue }}</td>
        <td>{{ r.totalPaid }}</td>
        <td>{{ r.totalRemaining }}</td>
      </tr>
    </tbody>
  </table>
</div>
