<app-page-layout [title]="'Documentos'" [showSidebar]="false" [showBackButton]="true">

  <nav>
    <div class="nav nav-tabs fs-5" id="nav-tab" role="tablist">
      <button class="nav-link active" id="nav-1-tab" data-bs-toggle="tab" data-bs-target="#nav-1" type="button"
        role="tab" aria-controls="nav-1" aria-selected="true">
        Atas de Reunião
      </button>

      <button class="nav-link" id="nav-2-tab" data-bs-toggle="tab" data-bs-target="#nav-2" type="button" role="tab"
        aria-controls="nav-2" aria-selected="false">
        Proposta Orçamentária
      </button>

      <button class="nav-link" id="nav-3-tab" data-bs-toggle="tab" data-bs-target="#nav-3" type="button" role="tab"
        aria-controls="nav-3" aria-selected="false">
        Contrato
      </button>

      <button class="nav-link" id="nav-4-tab" data-bs-toggle="tab" data-bs-target="#nav-4" type="button" role="tab"
        aria-controls="nav-4" aria-selected="false">
        Levantamentos
      </button>

      <button class="nav-link" id="nav-6-tab" data-bs-toggle="tab" data-bs-target="#nav-6" type="button" role="tab"
        aria-controls="nav-6" aria-selected="false">
        Outros Documentos
      </button>

      <a class="btn align-middle">
        <img src="/assets/img/icons/plus-circle.svg" alt="" width="20" height="20" data-bs-toggle="modal">
      </a>
    </div>
  </nav>

  <div class="tab-content p-3 border border-top-0" id="nav-tabContent">

    <!-- abas -->
    <div class="tab-pane fade show active" id="nav-1" role="tabpanel" aria-labelledby="nav-1-tab">
      <app-table [title]="'Atas de Reunião'"></app-table>
    </div>

    <div class="tab-pane fade" id="nav-2" role="tabpanel" aria-labelledby="nav-2-tab">
      <app-table [title]="'Proposta Orçamentária'"></app-table>
    </div>

    <div class="tab-pane fade" id="nav-3" role="tabpanel" aria-labelledby="nav-3-tab">
      <app-table [title]="'Contrato'"></app-table>
    </div>

    <div class="tab-pane fade" id="nav-4" role="tabpanel" aria-labelledby="nav-4-tab">
      <app-table [title]="'Levantamentos'"></app-table>
    </div>

    <div class="tab-pane fade" id="nav-6" role="tabpanel" aria-labelledby="nav-6-tab">
      <app-table [title]="'Outros Documentos'"></app-table>
    </div>

  </div>
</app-page-layout>
