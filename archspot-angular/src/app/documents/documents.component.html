<app-page-layout [title]="'Documentos'" [showSidebar]="false" [showBackButton]="true">

  <!-- NAV PRINCIPAL (Diretórios raiz) -->
  <nav *ngIf="directories.length > 0">
    <div class="nav nav-tabs fs-5" role="tablist">

      <button *ngFor="let dir of directories"
              class="nav-link"
              [class.active]="dir.id === activeTabId"
              type="button"
              (click)="setActiveTab(dir)">
        {{ dir.name }}
      </button>

      <!-- botão adicionar diretório -->
      <a class="btn align-middle ms-2">
        <img src="/assets/img/icons/plus-circle.svg" alt="" width="20" height="20">
      </a>
    </div>
  </nav>

  <!-- SUBDIRETÓRIOS (só aparece quando o diretório ativo tem filhos) -->
  <nav *ngIf="subdirectories.length > 0" class="mt-2">
    <div class="nav nav-tabs fs-6">
      <button *ngFor="let sub of subdirectories"
              class="nav-link"
              [class.active]="sub.id === activeSubTabId"
              type="button"
              (click)="setActiveSubTab(sub)">
        {{ sub.name }}
      </button>

      <!-- botão adicionar subdiretório -->
      <a class="btn align-middle ms-2">
        <img src="/assets/img/icons/plus-circle.svg" alt="" width="20" height="20">
      </a>
    </div>
  </nav>

  <!-- CONTEÚDO -->
  <div class="tab-content p-3 border border-top-0 mt-3">
    <!-- Se há subdiretório ativo -->
    <div *ngIf="activeSubTabId; else parentDocs">
      <app-table [directoryId]="activeSubTabId"></app-table>
    </div>

    <!-- Se o diretório não tem subdiretórios -->
    <ng-template #parentDocs>
      <app-table *ngIf="activeTabId" [directoryId]="activeTabId"></app-table>
    </ng-template>
  </div>

</app-page-layout>
