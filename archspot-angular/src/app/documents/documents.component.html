<app-page-layout [title]="'Documentos - ' + projectName" [showSidebar]="false" [showBackButton]="true">

  <!-- Novo componente que encapsula toda a lógica de diretórios -->
  <app-directory [projectId]="projectId" [userId]="userId" [isCustomerInProject]="isCustomerInProject"
    directoryType="DOCUMENTS" (directoryChanged)="onDirectoryChange($event)">
  </app-directory>

</app-page-layout>
