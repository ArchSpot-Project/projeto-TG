<app-page-layout [title]="'Projetos'" [showSidebar]="false" [showBackButton]="true" [fullWidth]="true">

  <!--ROW 1 - PROJETOS ABERTOS-->
  <app-section-title title="Projetos em Aberto">
    <button class="btn" type="button">
      <img src="/assets/img/icons/house-add.svg" alt="" width="25" height="25" data-bs-toggle="modal"
        data-bs-target="#modalCriarNovoProjeto">
    </button>
  </app-section-title>

  <div class="row g-4 row-cols-1 row-cols-md-2 row-cols-lg-5 pb-3">
    <div class="col" *ngFor="let project of openProjects">
      <app-project-card [project]="project" variant="detailed">
      </app-project-card>
    </div>
  </div>

  <!--ROW 2 - PROJETOS FECHADOS-->
  <app-section-title title="Projetos Fechados">
  </app-section-title>

  <div class="row g-4 row-cols-1 row-cols-md-2 row-cols-lg-5 pb-3">
    <div class="col" *ngFor="let project of closedProjects">
      <app-project-card [project]="project" variant="detailed">
      </app-project-card>
    </div>
  </div>

</app-page-layout>
