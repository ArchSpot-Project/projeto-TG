<div class="modal-overlay" *ngIf="show" (click)="cancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h4 class="modal-title">Criar projeto</h4>
    <hr>

    <!-- Campos do projeto -->
    <label class="fs-6 fw-semibold modal-label2">Nome</label>
    <input type="text" class="form-control mt-1 mb-3" [(ngModel)]="projectName" placeholder="Nome do projeto">

    <label class="fs-6 fw-semibold modal-label">Descrição</label>
    <textarea class="form-control mt-1 mb-3" [(ngModel)]="projectDescription" placeholder="Descrição do projeto"></textarea>

    <label class="fs-6 fw-semibold modal-label2">Previsão de início</label>
    <input type="date" class="form-control mt-1 mb-3" [(ngModel)]="estimatedStartDate">

    <label class="fs-6 fw-semibold modal-label2">Previsão de término</label>
    <input type="date" class="form-control mt-1 mb-3" [(ngModel)]="estimatedEndDate">

    <button class="btn btn-secondary mb-3" (click)="openAddUserModal()">Adicionar colaboradores</button>
    <app-add-user-modal
      [roles]="roles"
      [show]="showAddModal"
      (close)="cancelAdd()"
      (addUser)="handleAddUser($event)">
    </app-add-user-modal>

    <!-- lista de colaboradores adicionados ao projeto -->
    <label class="fs-6 fw-semibold modal-label2">Colaboradores adicionados:</label>
    <div *ngIf="!loading" class="flex-1 flex flex-col overflow-auto" style="max-height: 250px; border: 1px solid #ddd; padding: 8px; border-radius: 6px;">
      <table class="table table-zebra w-full" *ngIf="users.length > 0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Função</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users" class="hover:bg-gray-50">
            <td>{{ user.userId }}</td>
            <td>{{ user.userName }}</td>
            <td>{{ user.role }}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-error btn-outline" (click)="removeUser(user)" [disabled]="user.userId === currentUserId && user.role === 'ADMIN'" title="Remover usuário">
                <img src="assets/img/icons/trash3.svg" alt="Remover" class="w-4 h-4">
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div *ngIf="users.length === 0" class="py-10 text-center text-gray-500">
        Nenhum colaborador associado a este projeto.
      </div>
    </div>

    <div class="modal-actions mt-2 flex justify-end gap-2">
      <button class="btn btn-outline m-2" (click)="cancel()">Cancelar</button>
      <button class="btn btn-success" (click)="createProject()">Criar projeto</button>
    </div>
  </div>
</div>
