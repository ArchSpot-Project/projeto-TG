<!-- Linha principal: diretórios raiz + botão upload -->
<nav>
  <div class="nav nav-tabs fs-5" role="tablist">
    <button *ngFor="let dir of directories" class="nav-link" [class.active]="dir.id === activeRoot?.id" type="button"
      (click)="setActiveTab(dir)" (contextmenu)="openContextMenu($event, dir, true)">
      {{ dir.name }}
    </button>

    <!-- botão criar diretório raiz -->
    <a *ngIf="!isCustomerInProject || directoryType === 'DOCUMENTS'" class="btn d-inline-flex align-items-center"
      (click)="createDirectory()" title="Novo diretório raiz">
      <img src="/assets/img/icons/plus-circle.svg" alt="+" width="20" height="20">
    </a>
  </div>
</nav>

<!-- Subdiretórios (segunda linha de abas) -->
<nav *ngIf="activeRoot?.subdirectories?.length">
  <div class="nav nav-tabs border border-top-0 px-3 pt-3" role="tablist">
    <button *ngFor="let sub of activeRoot?.subdirectories" class="nav-link" [class.active]="sub.id === activeTabId"
      type="button" (click)="setActiveTab(sub)" (contextmenu)="openContextMenu($event, sub, false)">
      {{ sub.name }}
    </button>

    <!-- botão criar subdiretório -->
    <a *ngIf="(isAdminInProject() || isCollaboratorOrAssociated()) && activeRoot && directoryType === 'DRAWINGS'"
      class="btn d-inline-flex align-items-center" (click)="createSubdirectory(activeRoot)" title="Novo subdiretório">
      <img src="/assets/img/icons/plus-circle.svg" alt="+" width="18" height="18">
    </a>
  </div>
</nav>

<!-- Conteúdo -->
<div class="tab-content border rounded-bottom border-top-0 p-3">
  <app-table *ngIf="activeTabId" [directoryId]="activeTabId" [directoryType]="directoryType" [projectId]="projectId"
    [activeRootId]="activeRoot?.id">
  </app-table>
</div>

<!-- Context Menu -->
<ul *ngIf="contextMenu.visible" class="context-menu list-unstyled bg-white border rounded shadow-sm"
  [style.left.px]="contextMenu.x" [style.top.px]="contextMenu.y">

  <li (click)="editDirectoryName(contextMenu.dir!, $event)">Renomear</li>

  <!-- Excluir aparece apenas para ADMIN -->
  <li *ngIf="isAdminInProject()" (click)="deleteDirectory(contextMenu.dir!)">Excluir</li>

  <!-- Criar subdiretório: admins, colaboradores, associados -->
  <li *ngIf="contextMenu.isRoot && contextMenu.dir?.type === 'DRAWINGS' && 
             (isAdminInProject() || isCollaboratorOrAssociated())" (click)="createSubdirectory(contextMenu.dir!)">
    Criar subdiretório
  </li>
</ul>
