<div class="directory">
  <div class="directory-header" (click)="toggleExpand()">
    <!-- Ícone da pasta -->
    <img src="assets/img/icons/folder.svg" width="20" height="20" class="me-2 folder-icon" [class.open]="expanded" />

    <strong class="flex-grow-1">{{ directory.name }}</strong>

    <!-- Ações -->
    <div class="actions">
      <img src="assets/img/icons/pencil.svg" class="icon" title="Renomear diretório"
        (click)="renomearDiretorio(); $event.stopPropagation()" />

      <img src="assets/img/icons/trash3.svg" class="icon" title="Excluir diretório"
        (click)="deletarDiretorio(); $event.stopPropagation()" />

      <img *ngIf="directory.type === 'DOCUMENTS'" src="assets/img/icons/upload.svg" class="icon"
        title="Enviar documento" (click)="uploadFile(); $event.stopPropagation()" />
    </div>
  </div>

  <!-- Conteúdo (tabela de documentos) -->
  <div class="directory-content" *ngIf="expanded">
    <app-table *ngIf="documents.length > 0" [directoryId]="directory.id"
      [title]="'Documentos em ' + directory.name"></app-table>

    <!-- Se não houver documentos -->
    <div *ngIf="documents.length === 0" class="text-muted small ps-4 py-2">
      Nenhum documento neste diretório.
    </div>
  </div>
</div>
