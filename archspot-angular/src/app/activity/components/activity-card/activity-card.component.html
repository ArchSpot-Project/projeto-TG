<div class="card shadow-sm p-3 d-flex flex-row align-items-start">

  <img 
    *ngIf="activity.userAvatarUrl"
    [src]="'http://localhost:8080/' + activity.userAvatarUrl"
    class="rounded-circle me-3"
    style="width: 50px; height: 50px; object-fit: cover;"
  />

  <div class="flex-grow-1">
    <strong>{{ activity.userName }}</strong>
    <span class="badge bg-secondary ms-2">{{ activity.userRole }}</span>

    <p class="mt-2 mb-1">{{ description }}</p>

    <small class="text-muted">
      {{ activity.timestamp | date:'dd/MM/yyyy HH:mm' }}
    </small>
  </div>
</div>
