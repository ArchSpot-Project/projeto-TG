<div class="modal-overlay" *ngIf="show" (click)="cancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h4 class="modal-title">Criar etapa</h4>
    <hr />

    <label class="fs-6 fw-semibold modal-label2">Nome</label>
    <input type="text" class="form-control mt-1 mb-3" [(ngModel)]="phaseName" placeholder="Nome da etapa" />

    <label class="fs-6 fw-semibold modal-label">Descrição</label>
    <textarea class="form-control mt-1 mb-3" [(ngModel)]="phaseDescription"
      placeholder="Descrição da etapa"></textarea>

    <div class="row mb-3">
      <div class="col">
        <label class="fs-6 fw-semibold modal-label2">Previsão de início</label>
        <input type="date" class="form-control mt-1" [(ngModel)]="phaseEstimatedStartDate"
          [max]="phaseEstimatedEndDate || null"/>
      </div>
      <div class="col">
        <label class="fs-6 fw-semibold modal-label2">Previsão de término</label>
        <input type="date" class="form-control mt-1" [(ngModel)]="phaseEstimatedEndDate"
          [min]="phaseEstimatedStartDate || null"/>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <button class="btn btn-outline" (click)="cancel()">Cancelar</button>
      <button class="btn btn-success" (click)="createPhase()">Criar etapa</button>
    </div>
  </div>
</div>
